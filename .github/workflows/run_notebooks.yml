name: Run and Compile Notebooks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jupyter nbconvert nbformat ipykernel
          pip install numpy pandas matplotlib scipy scikit-learn
          python -m ipykernel install --user --name python3 --display-name 'Python 3'

      - name: Run and convert notebooks to HTML
        run: |
          shopt -s nullglob
          for nb in *.ipynb; do
            echo "Running: $nb"
            jupyter nbconvert --to notebook --execute "$nb" \
              --output "executed_output.ipynb" \
              --ExecutePreprocessor.timeout=600 \
              --ExecutePreprocessor.kernel_name=python3 \
              || echo "Warning: $nb failed to execute, converting without execution"
            if [ -f executed_output.ipynb ]; then
              safe_name=$(echo "$nb" | sed 's/[^a-zA-Z0-9._-]/_/g')
              jupyter nbconvert --to html "executed_output.ipynb" \
                --output "${safe_name%.ipynb}.html" || true
              rm -f executed_output.ipynb
            else
              safe_name=$(echo "$nb" | sed 's/[^a-zA-Z0-9._-]/_/g')
              jupyter nbconvert --to html "$nb" \
                --output "${safe_name%.ipynb}.html" || true
            fi
          done

      - name: Upload HTML outputs
        uses: actions/upload-artifact@v4
        with:
          name: notebooks-html
          path: "*.html"
          if-no-files-found: warn
